name: Secure Pages Deploy
on:
  push:
    branches: ["gh-pages"] # Change this to "main" if your code is on main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # THE LOCK: This ensures ONLY YOU can trigger the deployment
    if: github.actor == 'devonharant'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Point this to where your HTML files are
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4